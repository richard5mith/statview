services:
  statview:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: statview:dev
    command: >
      sh -c "uv sync --group dev &&
             uv run flask --app app.main:create_app run --host 0.0.0.0 --port 8000 --debug"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./:/app
      - statview_dev_venv:/app/.venv
      - statview_dev_uv_cache:/root/.cache/uv

volumes:
  statview_dev_venv:
  statview_dev_uv_cache:
