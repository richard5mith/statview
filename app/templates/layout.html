<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatView</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script>
      (() => {
        const saved = localStorage.getItem("statview-theme");
        if (saved === "light" || saved === "dark") {
          document.documentElement.dataset.initialTheme = saved;
        }
      })();
    </script>
  </head>
  <body data-theme="dark">
    <script>
      (() => {
        const initial = document.documentElement.dataset.initialTheme;
        if (initial) {
          document.body.dataset.theme = initial;
        }
      })();
    </script>
    <button type="button" class="theme-toggle" data-theme-toggle>Light mode</button>
    {% block content %}{% endblock %}
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
