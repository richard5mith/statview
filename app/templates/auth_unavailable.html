<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>StatView — auth unavailable</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 5rem auto; padding: 0 1rem; }
    h1 { color: #b00020; }
    pre { background: #f4f4f4; padding: 0.75rem; border-radius: 4px; white-space: pre-wrap; word-break: break-word; }
    .btn { display: inline-block; padding: 0.5rem 1rem; background: #24292f; color: #fff; border-radius: 6px; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Can't verify access right now</h1>
  <p>StatView couldn't reach GitHub to verify your access.</p>
  <pre>{{ detail }}</pre>
  <p><a class="btn" href="{{ url_for('auth.login_page') }}">Retry</a></p>
</body>
</html>
