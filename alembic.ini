[alembic]
script_location = alembic
# Used only when invoking the alembic CLI directly (e.g. `uv run alembic revision --autogenerate`).
# At runtime, app.db.migrate_database overrides this with the path derived from STATVIEW_DATA_DIR /
# SAVED_DB_PATH, so the URL below is only a developer-facing default.
sqlalchemy.url = sqlite:///./data/statview.sqlite3

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
